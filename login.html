<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anonymous Codex · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }
    body {
      background: #0b0d1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }
    .auth-container {
      width: 100%;
      max-width: 440px;
      margin: 20px;
      background: rgba(12, 16, 30, 0.65);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 48px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 30px 60px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(70, 150, 255, 0.15);
      padding: 40px 32px 36px;
      position: relative;
      overflow: hidden;
    }
    .auth-container::before {
      content: '';
      position: absolute;
      top: -40%;
      left: -30%;
      width: 160%;
      height: 180%;
      background: radial-gradient(circle at 20% 30%, rgba(0, 120, 255, 0.08), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      z-index: 2;
    }
    .auth-header i {
      font-size: 2.8rem;
      color: #6cb4ff;
      filter: drop-shadow(0 0 20px #3f8eff);
      margin-bottom: 8px;
    }
    .auth-header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #b6d9ff, #f0f9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .auth-header p {
      color: #8aa9e6;
      font-size: 0.95rem;
      margin-top: 4px;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      z-index: 2;
    }
    .auth-form input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 60px;
      padding: 16px 22px;
      font-size: 1rem;
      color: #eaf2ff;
      outline: none;
      transition: 0.25s;
      backdrop-filter: blur(4px);
    }
    .auth-form input:focus {
      border-color: #4a8eff;
      background: rgba(255,255,255,0.07);
      box-shadow: 0 0 20px rgba(70, 140, 255, 0.15);
    }
    .auth-form input::placeholder {
      color: #6d7fa3;
      font-weight: 400;
    }
    .auth-form .btn-primary {
      background: linear-gradient(145deg, #2b70e0, #1a4cbf);
      border: none;
      padding: 16px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 24px -6px #1a4cbf60;
      letter-spacing: 0.3px;
      margin-top: 6px;
    }
    .auth-form .btn-primary:hover {
      transform: scale(1.01);
      box-shadow: 0 10px 32px -4px #1a4cbfb0;
    }
    .auth-error {
      color: #ff8f8f;
      font-size: 0.85rem;
      text-align: center;
      min-height: 24px;
      margin-top: 6px;
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      position: relative;
      z-index: 2;
    }
    .auth-footer a {
      color: #6cb4ff;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }
    .auth-footer a:hover {
      color: #8ac4ff;
      text-decoration: underline;
    }
    .auth-footer p {
      color: #6d7fa3;
      font-size: 0.9rem;
    }
    @media (max-width: 480px) {
      .auth-container { padding: 30px 20px 28px; }
      .auth-header h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <i class="fas fa-robot"></i>
      <h1>Welcome Back</h1>
      <p>Log in to continue coding</p>
    </div>
    <form class="auth-form" id="loginForm">
      <input type="text" id="loginEmailUser" placeholder="Email or username" autocomplete="username" required>
      <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" required>
      <button class="btn-primary" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i> &nbsp;Log in</button>
      <div class="auth-error" id="loginError"></div>
    </form>
    <div class="auth-footer">
      <p>Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>

  <script>
    function getUsers() {
      try { return JSON.parse(localStorage.getItem('codex_users')) || {}; } catch { return {}; }
    }

    function setSession(user) {
      localStorage.setItem('codex_user', JSON.stringify(user));
    }

    document.getElementById('loginBtn').addEventListener('click', function(e) {
      e.preventDefault();
      const identifier = document.getElementById('loginEmailUser').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const errorEl = document.getElementById('loginError');

      if (!identifier || !password) {
        errorEl.textContent = '❌ Please fill all fields.';
        return;
      }

      const users = getUsers();
      let found = null;
      for (const key in users) {
        const u = users[key];
        if ((u.email === identifier || u.username === identifier) && u.password === password) {
          found = { username: u.username, email: u.email };
          break;
        }
      }

      if (found) {
        setSession(found);
        window.location.href = 'dashboard.html';
      } else {
        errorEl.textContent = '❌ Invalid credentials or user not found.';
      }
    });

    // Enter key support
    document.getElementById('loginForm').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('loginBtn').click();
      }
    });
  </script>
</body>
</html>
