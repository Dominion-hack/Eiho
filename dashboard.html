<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anonymous Codex · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: #0b0d1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow-x: hidden; }
    #app { width: 100%; max-width: 820px; height: 95vh; max-height: 900px; margin: 20px; background: rgba(12, 16, 30, 0.65); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-radius: 48px; border: 1px solid rgba(255, 255, 255, 0.06); box-shadow: 0 30px 60px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(70, 150, 255, 0.15); display: flex; flex-direction: column; position: relative; overflow: hidden; }
    #app::before { content: ''; position: absolute; top: -40%; left: -30%; width: 160%; height: 180%; background: radial-gradient(circle at 20% 30%, rgba(0, 120, 255, 0.08), transparent 60%); pointer-events: none; z-index: 0; }
    .app-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 28px 12px 28px; position: relative; z-index: 2; border-bottom: 1px solid rgba(255,255,255,0.04); flex-shrink: 0; }
    .app-brand { display: flex; align-items: center; gap: 10px; }
    .app-brand i { font-size: 1.6rem; color: #6cb4ff; filter: drop-shadow(0 0 10px #3f8eff); }
    .app-brand h1 { font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, #b6d9ff, #f0f9ff); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.5px; }
    .user-badge { background: rgba(255,255,255,0.04); padding: 6px 14px 6px 12px; border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.06); color: #b0cbff; font-size: 0.8rem; font-weight: 500; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(2px); }
    .user-badge i { color: #5faaff; font-size: 0.9rem; }
    #logoutBtn { background: transparent; border: none; color: #8aa9e6; cursor: pointer; font-size: 0.8rem; padding: 2px 8px; border-radius: 20px; transition: 0.2s; }
    #logoutBtn:hover { background: rgba(255,70,70,0.15); color: #ff8a8a; }
    .chat-container { flex: 1; overflow-y: auto; padding: 20px 28px; position: relative; z-index: 2; display: flex; flex-direction: column; gap: 16px; }
    .chat-container::-webkit-scrollbar { width: 4px; }
    .chat-container::-webkit-scrollbar-thumb { background: #3f6bb0; border-radius: 10px; }
    .message { display: flex; flex-direction: column; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { align-items: flex-end; }
    .message.ai { align-items: flex-start; }
    .message-bubble { max-width: 85%; padding: 14px 20px; border-radius: 20px; position: relative; word-wrap: break-word; }
    .message.user .message-bubble { background: linear-gradient(145deg, #1a4cbf, #2b70e0); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(26, 76, 191, 0.3); }
    .message.ai .message-bubble { background: rgba(255,255,255,0.04); color: #d3e3ff; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.04); }
    .message-label { font-size: 0.7rem; color: #6f8bc0; margin-bottom: 4px; padding: 0 4px; font-weight: 500; }
    .message.ai .message-bubble pre { background: rgba(0,0,0,0.4); padding: 16px; border-radius: 12px; overflow-x: auto; margin: 8px 0; border: 1px solid rgba(255,255,255,0.05); position: relative; }
    .message.ai .message-bubble code { font-family: 'Courier New', monospace; font-size: 0.85rem; color: #eef6ff; }
    .copy-btn { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.1); border: none; color: #aac0f0; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; transition: 0.2s; backdrop-filter: blur(4px); }
    .copy-btn:hover { background: rgba(255,255,255,0.2); color: white; }
    .copy-btn.copied { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
    .ai-text-content { white-space: pre-wrap; line-height: 1.6; color: #d3e3ff; }
    .typing-dots { display: flex; gap: 4px; padding: 8px 0; }
    .typing-dots span { width: 8px; height: 8px; background: #6f8bc0; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
    .typing-dots span:nth-child(1) { animation-delay: 0s; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-8px); opacity: 1; } }
    .input-area { padding: 16px 28px 24px 28px; position: relative; z-index: 2; border-top: 1px solid rgba(255,255,255,0.04); flex-shrink: 0; display: flex; gap: 12px; align-items: flex-end; background: rgba(0,0,0,0.15); }
    .input-area textarea { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 28px; padding: 14px 20px; font-size: 0.95rem; color: #eef6ff; resize: none; outline: none; transition: 0.2s; min-height: 52px; max-height: 120px; line-height: 1.5; backdrop-filter: blur(4px); }
    .input-area textarea:focus { border-color: #4a8eff; background: rgba(255,255,255,0.07); box-shadow: 0 0 20px rgba(70, 140, 255, 0.1); }
    .input-area textarea::placeholder { color: #6d7fa3; }
    .input-area .send-btn { background: linear-gradient(145deg, #2b70e0, #1a4cbf); border: none; width: 52px; height: 52px; border-radius: 50%; color: white; font-size: 1.2rem; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 16px -4px #1a4cbf60; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .input-area .send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 24px -2px #1a4cbfb0; }
    .input-area .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    @media (max-width: 480px) { #app { margin: 10px; border-radius: 32px; height: 98vh; } .app-header { padding: 16px 20px 10px 20px; } .chat-container { padding: 16px 20px; } .input-area { padding: 12px 20px 18px 20px; gap: 8px; } .app-brand h1 { font-size: 1.1rem; } .message-bubble { max-width: 92%; } }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-header">
      <div class="app-brand"><i class="fas fa-robot"></i><h1>Anonymous Codex</h1></div>
      <div class="user-badge" id="userBadge"><i class="fas fa-user-circle"></i><span id="usernameDisplay">user</span><button id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button></div>
    </div>
    <div class="chat-container" id="chatContainer">
      <div class="message ai">
        <div class="message-label"><i class="fas fa-robot"></i> Codex</div>
        <div class="message-bubble"><div class="ai-text-content">👋 Hello! I'm Anonymous Codex. Describe what you want to code and I'll generate it securely!</div></div>
      </div>
    </div>
    <div class="input-area">
      <textarea id="promptInput" placeholder="Describe what you want to code..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <script>
    (function() {
      const usernameDisplay = document.getElementById('usernameDisplay');
      const logoutBtn = document.getElementById('logoutBtn');
      const promptInput = document.getElementById('promptInput');
      const sendBtn = document.getElementById('sendBtn');
      const chatContainer = document.getElementById('chatContainer');

      function getSession() { try { return JSON.parse(localStorage.getItem('codex_user')); } catch { return null; } }
      function clearSession() { localStorage.removeItem('codex_user'); }

      const session = getSession();
      usernameDisplay.textContent = session ? (session.username || session.email || 'user') : 'Guest Developer';

      logoutBtn.addEventListener('click', function() { clearSession(); window.location.href = 'login.html'; });

      promptInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });

      function cleanMarkdownCode(rawText) { return rawText.replace(/^```[a-z0-9\-]*\n/i, '').replace(/\n```$/, '').trim(); }

      function addMessage(type, content, isCode = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;
        const label = document.createElement('div');
        label.className = 'message-label';
        label.innerHTML = type === 'user' ? `<i class="fas fa-user"></i> You` : `<i class="fas fa-robot"></i> Codex`;
        messageDiv.appendChild(label);

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';

        if (type === 'user') {
          bubble.textContent = content;
        } else {
          if (isCode) {
            const cleanContent = cleanMarkdownCode(content);
            const pre = document.createElement('pre');
            const code = document.createElement('code');
            code.textContent = cleanContent;
            pre.appendChild(code);
            
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
            copyBtn.addEventListener('click', function(e) {
              e.stopPropagation();
              navigator.clipboard.writeText(cleanContent).then(() => {
                copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                copyBtn.classList.add('copied');
                setTimeout(() => { copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy'; copyBtn.classList.remove('copied'); }, 2000);
              });
            });
            pre.appendChild(copyBtn);
            bubble.appendChild(pre);
          } else {
            const textDiv = document.createElement('div');
            textDiv.className = 'ai-text-content';
            textDiv.textContent = content;
            bubble.appendChild(textDiv);
          }
        }
        messageDiv.appendChild(bubble);
        chatContainer.appendChild(messageDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return messageDiv;
      }

      function addTypingDots() {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message ai';
        messageDiv.id = 'typingMessage';
        const label = document.createElement('div');
        label.className = 'message-label';
        label.innerHTML = `<i class="fas fa-robot"></i> Codex`;
        messageDiv.appendChild(label);
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        const dots = document.createElement('div');
        dots.className = 'typing-dots';
        for (let i = 0; i < 3; i++) { dots.appendChild(document.createElement('span')); }
        bubble.appendChild(dots);
        messageDiv.appendChild(bubble);
        chatContainer.appendChild(messageDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return messageDiv;
      }

      function removeTypingDots() { const typing = document.getElementById('typingMessage'); if (typing) typing.remove(); }

      async function callBackendAPI(prompt) {
        // Automatically makes a POST call relative to your hosted domain /api/chat
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error?.message || `API Error: ${response.status}`);
        return data.content;
      }

      async function sendMessage() {
        const prompt = promptInput.value.trim();
        if (!prompt) return;

        addMessage('user', prompt);
        promptInput.value = '';
        promptInput.style.height = 'auto';
        sendBtn.disabled = true;
        addTypingDots();

        try {
          const code = await callBackendAPI(prompt);
          removeTypingDots();
          addMessage('ai', code, true);
        } catch (error) {
          removeTypingDots();
          addMessage('ai', `❌ Error: ${error.message}`, false);
        } finally {
          sendBtn.disabled = false;
          promptInput.focus();
        }
      }

      sendBtn.addEventListener('click', sendMessage);
      promptInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
      promptInput.focus();
    })();
  </script>
</body>
</html>
